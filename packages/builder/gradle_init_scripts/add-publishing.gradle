allprojects { project ->
    if (!project.plugins.hasPlugin("maven-publish")) {
        project.plugins.apply("maven-publish")
    }

    // Configure android.publishing.singleVariant before projects are evaluated
    // This needs to happen after the Android plugin is applied but before evaluation completes
    project.afterEvaluate { proj ->
        if (proj.plugins.hasPlugin("com.android.library")) {
            try {
                if (proj.hasProperty('android')) {
                    def android = proj.android
                    if (android.hasProperty('publishing')) {
                        android.publishing {
                            singleVariant("release")
                        }
                    }
                }
            } catch (Exception e) {
                println "Warning: Could not configure singleVariant for ${proj.name}: ${e.message}"
            }
        }
    }
}

def generateCMakeContent(codegenName) {
    // Uses CMAKE_CURRENT_LIST_DIR-relative paths so the file works wherever it is extracted.
    // Groovy \$ produces a literal $ in the output (cmake variable reference).
    //
    // STATIC IMPORTED targets cannot be used with non-INTERFACE keyword in target_link_libraries,
    // which RN's ReactNative-application.cmake does internally. A real STATIC target (with a
    // generated placeholder source) works correctly in all CMake linking contexts.
    return """cmake_minimum_required(VERSION 3.13)

if(CMAKE_BUILD_TYPE)
    string(TOLOWER "\${CMAKE_BUILD_TYPE}" RNREPO_BUILD_TYPE)
    # plain Release maps to relwithdebinfo artifacts (relwithdebinfo works with release, the other way round not)
    if(RNREPO_BUILD_TYPE STREQUAL "release")
        set(RNREPO_BUILD_TYPE "relwithdebinfo")
    endif()
else()
    set(RNREPO_BUILD_TYPE "relwithdebinfo")
endif()

set(_rnrepo_src_${codegenName} "\${CMAKE_CURRENT_BINARY_DIR}/rnrepo_placeholder_${codegenName}.cpp")
if(NOT EXISTS "\${_rnrepo_src_${codegenName}}")
    file(WRITE "\${_rnrepo_src_${codegenName}}" "// RNRepo placeholder\\n")
endif()

add_library(react_codegen_${codegenName} STATIC "\${_rnrepo_src_${codegenName}}")

target_include_directories(react_codegen_${codegenName} PUBLIC
    "\${CMAKE_CURRENT_LIST_DIR}/../headers"
    "\${CMAKE_CURRENT_LIST_DIR}/../headers/react/renderer/components/${codegenName}"
)

target_link_libraries(react_codegen_${codegenName}
    "\${CMAKE_CURRENT_LIST_DIR}/../\${RNREPO_BUILD_TYPE}/\${ANDROID_ABI}/libreact_codegen_${codegenName}.a"
    fbjni
    jsi
    reactnative
)

if(COMMAND target_compile_reactnative_options)
    target_compile_reactnative_options(react_codegen_${codegenName} PRIVATE)
endif()
"""
}

def createExtractCodegenBinariesTask(libraryProject, codegenName, buildType) {
    return libraryProject.tasks.register("extractCodegenBinaries${buildType}") {
        onlyIf { codegenName != null }
        doLast {
            def appCxxDir = file("${libraryProject.rootProject.projectDir}/app/.cxx")
            def archs = ["arm64-v8a", "armeabi-v7a", "x86", "x86_64"]
            def moduleFolder = "${codegenName}_autolinked_build"
            archs.each { arch ->
                // Find the .a file for this arch. Match the ABI as a full path
                // segment (split on File.separator) rather than a bare substring,
                // otherwise arch "x86" would also match the "x86_64" directory and 
                // the 32-bit artifact would be in the 64-bit dir. See issue #419.
                def staticLib = fileTree(dir: appCxxDir, include: "**/$moduleFolder/**/libreact_codegen_${codegenName}.a")
                    .find { arch in it.path.split(File.separator) }
                if (staticLib) {
                    def assetBuildType = buildType == "Release" ? "relwithdebinfo" : buildType.toLowerCase()
                    def destDir = file("${libraryProject.projectDir}/src/main/assets/${assetBuildType}/$arch")
                    destDir.mkdirs()
                    copy { from staticLib; into destDir }
                    println "📦 Copied ${buildType} codegen library for $arch from ${staticLib.path}"
                } else {
                    println "⚠️  Warning: Codegen library not found for $arch in ${appCxxDir.absolutePath}"
                }
            }
            // Metadata — written once (Release only to avoid duplication)
            if (buildType == "Release") {
                def metaDir = file("${libraryProject.projectDir}/src/main/assets/meta")
                metaDir.mkdirs()
                file("${metaDir}/codegen_name.txt").text = codegenName
                // npm_name.txt lets the consumer map the Gradle artifact ID back to the npm
                // package name for logging (e.g. @expensify/react-native-live-markdown)
                def npmName = libraryProject.findProperty('rnrepoNpmName') ?: ''
                if (npmName) {
                    file("${metaDir}/npm_name.txt").text = npmName
                }
            }
        }
    }
}

def configureCodegenTasks(project) {
    // Codegen name is passed from build-library-android.ts when building codegen version
    def codegenName = project.hasProperty('rnrepoCodegenName') 
        ? project.property('rnrepoCodegenName') 
        : null

    // Create extract tasks for both Debug and Release (CAPITALIZED! due to String::capitalized() is deprecated)
    def extractDebugTask = createExtractCodegenBinariesTask(project, codegenName, "Debug")
    def extractReleaseTask = createExtractCodegenBinariesTask(project, codegenName, "Release")

    // Task to package headers - must run after codegen generation
    def packageHeadersTask = project.tasks.register("packageCppHeaders") {
        onlyIf { codegenName != null }
        
        // Only add dependency if generateCodegenArtifactsFromSchema task exists
        def codegenTask = project.tasks.findByName('generateCodegenArtifactsFromSchema')
        if (codegenTask != null) {
            dependsOn(codegenTask)
        }
        
        doLast {
            def headersDestDir = file("${project.projectDir}/src/main/assets/headers")
            headersDestDir.mkdirs()

            def headerSources = [
                // Codegen generated headers
                file("${project.buildDir}/generated/source/codegen/jni"),
                
                // JNI headers specific to Android
                file("${project.projectDir}/src/main/jni"),
                
                // Common locations for Shared C++ (relative to 'android' folder)
                file("${project.projectDir}/../cpp"),
                file("${project.projectDir}/../common/cpp"),
                file("${project.projectDir}/../Common/cpp"),
                file("${project.projectDir}/../shared")
            ]

            headerSources.each { source ->
                if (source.exists()) {
                    println "🔍 Collecting headers from: ${source.absolutePath}"
                    project.copy {
                        from source
                        into headersDestDir
                        include "**/*.h"
                        // Preserve folder structure relative to 'source'
                    }
                }
            }

            // Failsafe: Check if anything was copied
            if (headersDestDir.list()?.length > 0) {
                println "📦 Successfully packaged all headers to assets/headers"
            } else {
                println "❌ Error: No headers found in any of the source directories!"
            }
        }
    }

    def packageCodegenCMakeTask = project.tasks.register("packageCodegenCMake") {
        onlyIf { codegenName != null }
        doLast {
            def cmakeDir = file("${project.projectDir}/src/main/assets/cmake")
            cmakeDir.mkdirs()
            file("${cmakeDir}/CMakeLists.txt").text = generateCMakeContent(codegenName)
            println "📦 Packaged codegen CMakeLists.txt to assets/cmake"
        }
    }

    // Hook extract tasks to app's assemble tasks
    project.rootProject.subprojects.each { subproject ->
        if (subproject.name == 'app') {
            def assembleDebugTask = subproject.tasks.findByName('assembleDebug')
            if (assembleDebugTask) {
                assembleDebugTask.finalizedBy(extractDebugTask)
                println "🔗 Linked extractCodegenBinariesDebug to app's assembleDebug"
            }

            def assembleReleaseTask = subproject.tasks.findByName('assembleRelease')
            if (assembleReleaseTask) {
                assembleReleaseTask.finalizedBy(extractReleaseTask)
                println "🔗 Linked extractCodegenBinariesRelease to app's assembleRelease"
            }
        }
    }

    // Hook into mergeReleaseAssets to ensure assets are packaged before AGP scans them
    def mergeAssetsTask = project.tasks.findByName('mergeReleaseAssets')
    if (mergeAssetsTask) {
        mergeAssetsTask.dependsOn(packageHeadersTask)
        mergeAssetsTask.dependsOn(packageCodegenCMakeTask)
    }

    try {
        if (project.hasProperty('android')) {
            def android = project.android

            android.sourceSets.main {
                assets.srcDirs += ["src/main/assets"]
            }
        }
    } catch (Exception e) {
        println "Warning: Could not configure Android settings for ${project.name}: ${e.message}"
    }

    return [codegenName: codegenName, packageHeadersTask: packageHeadersTask, packageCodegenCMakeTask: packageCodegenCMakeTask]
}

gradle.projectsEvaluated {
    allprojects { project ->

        // Target only Android library modules
        if (project.plugins.hasPlugin("com.android.library")) {
            
            def codegenConfig = configureCodegenTasks(project)
            def codegenName = codegenConfig.codegenName
            def packageHeadersTask = codegenConfig.packageHeadersTask

            // Configure maven-publish publications
            // components.release should now be available after singleVariant is configured
            try {
                publishing {
                    publications {
                        release(MavenPublication) {
                            // This is needed for dependencies to be automatically populated in the POM
                            from project.components.release

                            groupId = 'org.rnrepo.public'
                            artifactId = project.findProperty('rnrepoArtifactId')
                            version = project.findProperty('rnrepoPublishVersion')

                            // We re-add the AAR artifacts here in order to have the classifier specified
                            artifacts.removeAll { it.classifier == null }
                            def aarTask = project.tasks.findByName('bundleReleaseAar')
                            if (aarTask) {
                                def baseClassifier = project.findProperty('rnrepoClassifier') ?: ''
                                def finalClassifier = codegenName ? "${baseClassifier}-codegen" : baseClassifier
                                artifact(aarTask.outputs.files.singleFile) {
                                    classifier = finalClassifier
                                    extension = 'aar'
                                }
                            }

                            pom {
                                withXml {
                                    def rootNode = asNode()
                                    def propertiesNode = rootNode.children().find { it.name() == 'properties' }
                                    if (!propertiesNode) {
                                        propertiesNode = rootNode.appendNode('properties')
                                    }

                                    def buildDurationSeconds = project.hasProperty('rnrepoBuildDurationSeconds') ? project.property('rnrepoBuildDurationSeconds') : null

                                    if (buildDurationSeconds != null) {
                                        propertiesNode.appendNode('rnrepo.buildDurationSeconds', String.format("%.3f", buildDurationSeconds))
                                    }

                                    def cpuInfo = project.findProperty('rnrepoCpuInfo')
                                    if (cpuInfo != null) {
                                        propertiesNode.appendNode('rnrepo.cpuinfo', cpuInfo)
                                    }

                                    def buildUrl = project.findProperty('rnrepoBuildUrl')
                                    if (buildUrl != null) {
                                        propertiesNode.appendNode('rnrepo.buildUrl', buildUrl)
                                    }
                                }
                                licenses {
                                    // rnrepoLicenseName is a comma-separated list of SPDX
                                    // license ids (e.g. "MIT" or "MIT,BSD-3-Clause" for an
                                    // SPDX "(MIT AND BSD-3-Clause)" expression). Emit one
                                    // <license> node per entry.
                                    def licenseSpec = delegate
                                    def licenseNames = project.findProperty('rnrepoLicenseName')
                                    if (licenseNames != null) {
                                        licenseNames.toString().split(',').each { rawName ->
                                            def licenseName = rawName.trim()
                                            if (licenseName) {
                                                licenseSpec.license { lic ->
                                                    lic.name = licenseName
                                                    lic.url = "https://opensource.org/license/${licenseName}"
                                                }
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                    repositories {
                        mavenLocal()
                    }
                }

                // Disable Gradle Module Metadata generation
                tasks.matching { it.name.startsWith('generateMetadataFileFor') }.configureEach {
                    enabled = false
                }

                // Print execution time for bundleReleaseAar task (including dependencies) and expose as metadata
                def bundleReleaseAarTask = project.tasks.findByName('bundleReleaseAar')
                if (bundleReleaseAarTask) {
                    def startTime = System.currentTimeMillis()
                    project.extensions.extraProperties.set('rnrepoBuildDurationSeconds', null)

                    bundleReleaseAarTask.doLast {
                        def endTime = System.currentTimeMillis()
                        def duration = endTime - startTime
                        def seconds = duration / 1000.0
                        project.extensions.extraProperties.set('rnrepoBuildDurationSeconds', seconds)
                        println "⏱️  bundleReleaseAar (wall clock, deps included) completed in ${String.format('%.3f', seconds)} seconds"
                    }
                }
                // add generatePomFileForReleasePublication dependsOn bundleReleaseAarTask for build duration variable
                def generatePomFileTask = project.tasks.findByName('generatePomFileForReleasePublication')
                if (generatePomFileTask && bundleReleaseAarTask) {
                    generatePomFileTask.dependsOn(bundleReleaseAarTask)
                }
            } catch (Exception e) {
                println "Warning: Could not configure publishing for ${project.name}: ${e.message}"
            }
        }
    }
}