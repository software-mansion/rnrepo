name: Setup iOS Environment
description: Sets up Xcode and CocoaPods, plus npm security settings

inputs:
  xcode-version:
    description: 'Xcode version to use'
    required: false
    default: '26.1'
  cocoapods-version:
    description: 'CocoaPods version to install'
    required: false
    default: '1.15.2'

runs:
  using: composite
  steps:
    - name: 🔒 Configure npm security settings
      uses: ./.github/actions/configure-npm-security

    - name: 🍎 Use Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ inputs.xcode-version }}

    - name: 💎 Install CocoaPods
      shell: bash
      run: gem install cocoapods -v ${INPUTS_COCOAPODS_VERSION}
      env:
        INPUTS_COCOAPODS_VERSION: ${{ inputs.cocoapods-version }}
