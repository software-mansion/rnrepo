name: 🐛 Bug Report
description: Report a bug or issue in RNRepo
title: "[BUG] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: 📋 Description
      description: Please clearly and concisely describe what the issue is
      placeholder: Describe the issue here...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔄 Steps to Reproduce
      description: Describe the exact steps needed to reproduce the problem
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🛠️ Environment Information"

  - type: input
    id: rnrepo-version
    attributes:
      label: "@rnrepo/build-tools or @rnrepo/expo-config-plugin version"
      placeholder: "e.g., 0.2.0"
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment details
      description: What versions of relevant tools are you using? 
      placeholder: "e.g., react-native: 0.72.3, expo: 49.0.0, xcode: 15.0"
