name: 📚 Library Support Request
description: Request support for a new library in RNRepo
title: "[LIBRARY REQUEST] "
labels: ["library-request", "feature-request"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for requesting library support! Please fill out the form below as completely as possible.

  - type: textarea
    id: library-name
    attributes:
      label: 📚 Library Name
      description: What library should be added to RNRepo and info about it?
      placeholder: |
        - Library name 
        - Known compilation issues
        - Dependencies on other libraries
        - Special requirements
        - Etc.
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## 🔗 Links"

  - type: input
    id: npm-link
    attributes:
      label: NPM Link
      placeholder: "https://www.npmjs.com/package/..."
    validations:
      required: true

  - type: input
    id: github-link
    attributes:
      label: GitHub Repository
      placeholder: "https://github.com/..."

  - type: input
    id: docs-link
    attributes:
      label: Documentation Link (if applicable)
      placeholder: "https://..."
