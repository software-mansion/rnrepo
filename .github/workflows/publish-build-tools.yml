name: Publish RNRepo Prebuilds Plugin to npm
run-name: Publish @rnrepo/build-tools to npm

on:
  workflow_dispatch:
    inputs:
      beta_or_latest:
        description: 'Publish as beta or latest'
        required: true
        default: 'beta'
        type: choice
        options:
          - 'beta'
          - 'latest'

jobs:
  publish-build-tools:
    runs-on: rnrepo-ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write  # Required for OIDC
      contents: read
    env:
      PLUGIN_DIR: packages/build-tools
    defaults:
      run:
        working-directory: ${{ env.PLUGIN_DIR }}

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      
      - name: 🗃️ Cache Bun and Gradle
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.bun/install/cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-bun-gradle-${{ hashFiles('**/bun.lock', '**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-bun-gradle-

      - name: 🏗 Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1.2.2
        with:
          bun-version: latest

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: 🏗 Update npm
        run: npm install -g npm@11.18.0

      - name: 🚀 Publish to npm
        run: npm publish --tag ${GITHUB_EVENT_INPUTS_BETA_OR_LATEST}
        env:
          GITHUB_EVENT_INPUTS_BETA_OR_LATEST: ${{ github.event.inputs.beta_or_latest }}
