name: Publish RNRepo Prebuilds Plugin to npm
run-name: Publish @rnrepo/build-tools to npm

on:
  workflow_dispatch:
    inputs:
      beta_or_latest:
        description: 'Publish as beta or latest'
        required: true
        default: 'beta'
        type: choice
        options:
          - 'beta'
          - 'latest'

jobs:
  publish-build-tools:
    runs-on: rnrepo-ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC
      contents: read
    env:
      PLUGIN_DIR: packages/build-tools
    defaults:
      run:
        working-directory: ${{ env.PLUGIN_DIR }}

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      
      - name: 🗃️ Cache Bun and Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-bun-gradle-${{ hashFiles('**/bun.lock', '**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-bun-gradle-

      - name: 🏗 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: 🏗 Update npm
        run: npm install -g npm@latest

      - name: 🚀 Publish to npm
        run: npm publish --tag ${GITHUB_EVENT_INPUTS_BETA_OR_LATEST}
        env:
          GITHUB_EVENT_INPUTS_BETA_OR_LATEST: ${{ github.event.inputs.beta_or_latest }}
