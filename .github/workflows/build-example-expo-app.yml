name: Build Example Expo App

run-name: Build Example Expo App (Android + iOS)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [labeled]
  workflow_dispatch:
    inputs:
      expo_sdk_major_version:
        description: 'Expo SDK major version used in `create-expo-app@latest --template default@sdk-<major_version>`'
        required: false
        type: string
        default: '56'
      request_android:
        description: 'Request android build'
        required: false
        type: boolean
        default: false
      request_ios:
        description: 'Request ios build'
        required: false
        type: boolean
        default: false
      disable_rnrepo:
        description: 'Disable rnrepo config plugin'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPO_SDK_MAJOR_VERSION: ${{ github.event.inputs.expo_sdk_major_version || '56' }}
  EXAMPLE_APP: expoExampleApp

jobs:
  check-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
      contents: read
    outputs:
      android: >-
        ${{ (github.event_name == 'push' && steps.filter.outputs.android == 'true') || 
            (github.event_name == 'workflow_dispatch' && inputs.request_android == true) || 
            (github.event_name == 'pull_request' && !github.event.pull_request.draft && (
              contains(github.event.pull_request.labels.*.name, 'build-android') || 
              contains(github.event.pull_request.labels.*.name, 'build-expo')
            )) 
        }}
      ios: >-
        ${{ (github.event_name == 'push' && steps.filter.outputs.ios == 'true') || 
            (github.event_name == 'workflow_dispatch' && inputs.request_ios == true) || 
            (github.event_name == 'pull_request' && !github.event.pull_request.draft && (
              contains(github.event.pull_request.labels.*.name, 'build-ios') || 
              contains(github.event.pull_request.labels.*.name, 'build-expo')
            )) 
        }}
    steps:
      - name: 🏗 Checkout repository
        if: github.event_name == 'push' # workflow_dispatch has no changes, pr only looks on labels
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: 🔍 Check for file changes
        if: github.event_name == 'push' # workflow_dispatch has no changes, pr only looks on labels
        uses: dorny/paths-filter@4512585405083f25c027a35db413c2b3b9006d50 # v2.11.1
        id: filter
        with:
          filters: |
            android:
              - 'packages/build-tools/gradle-plugin/**'
              - '.github/workflows/build-example-expo-app.yml'
              - '.github/actions/setup-expo-example-app/**'
              - '.github/workflows/scripts/**'
              - 'packages/expo-config-plugin/**'
              - '!**/*.md'
            ios:
              - 'packages/build-tools/cocoapods-plugin/**'
              - '.github/workflows/build-example-expo-app.yml'
              - '.github/actions/setup-expo-example-app/**'
              - '.github/workflows/scripts/**'
              - 'packages/expo-config-plugin/**'
              - '!**/*.md'

  build-example-expo-app-android:
    needs: check-changes
    if: needs.check-changes.outputs.android == 'true'
    runs-on: rnrepo-builder-ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: 🤖 Setup Android environment
        uses: ./.github/actions/setup-android

      - name: ♻️ Cache Gradle files
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-expo-${{ env.EXPO_SDK_MAJOR_VERSION }}
          restore-keys: |
            gradle-${{ runner.os }}-expo-
            gradle-${{ runner.os }}-

      - name: 🔧 Setup Expo Example App
        uses: ./.github/actions/setup-expo-example-app
        with:
          example_app: ${{ env.EXAMPLE_APP }}
          expo_sdk_major_version: ${{ env.EXPO_SDK_MAJOR_VERSION }}
          disable_rnrepo: ${{ github.event.inputs.disable_rnrepo }}

      - name: 🏗 Build Gradle Plugin JAR
        run: ./gradlew build
        working-directory: packages/build-tools/gradle-plugin

      - name: 🏗 Build expo plugin
        run: bun run build
        working-directory: packages/expo-config-plugin

      - name: 🛠 Prebuild for Android
        run: bunx expo prebuild --platform android --clean
        working-directory: ${{ env.EXAMPLE_APP }}

      # --configure-on-demand is used in expo by default
      - name: 🏗 Build Expo App for Android (Debug)
        run: ./gradlew :app:assembleDebug --configure-on-demand
        working-directory: ${{ env.EXAMPLE_APP }}/android

      - name: 🏗 Build Expo App for Android (Release)
        run: ./gradlew :app:assembleRelease --configure-on-demand
        working-directory: ${{ env.EXAMPLE_APP }}/android

  build-example-expo-app-ios:
    needs: check-changes
    if: needs.check-changes.outputs.ios == 'true'
    runs-on: macos-latest-xlarge
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: 🍎 Setup iOS environment
        uses: ./.github/actions/setup-ios

      - name: ♻️ Cache CocoaPods
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cocoapods
          key: cocoapods-${{ runner.os }}-expo-${{ env.EXPO_SDK_MAJOR_VERSION }}
          restore-keys: |
            cocoapods-${{ runner.os }}-expo-
            cocoapods-${{ runner.os }}-

      - name: 🔧 Setup Expo Example App
        uses: ./.github/actions/setup-expo-example-app
        with:
          example_app: ${{ env.EXAMPLE_APP }}
          expo_sdk_major_version: ${{ env.EXPO_SDK_MAJOR_VERSION }}
          disable_rnrepo: ${{ github.event.inputs.disable_rnrepo }}

      - name: 🏗 Build expo plugin
        run: bun run build
        working-directory: packages/expo-config-plugin

      - name: 🛠 Prebuild for iOS
        run: bunx expo prebuild --platform ios --clean
        working-directory: ${{ env.EXAMPLE_APP }}

      - name: 🏗 Build Expo App for iOS (Debug)
        run: |
          xcodebuild \
            -workspace ${EXAMPLE_APP}.xcworkspace \
            -scheme ${EXAMPLE_APP} \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
        working-directory: ${{ env.EXAMPLE_APP }}/ios

      - name: 🏗 Build Expo App for iOS (Release)
        run: |
          xcodebuild \
            -workspace ${EXAMPLE_APP}.xcworkspace \
            -scheme ${EXAMPLE_APP} \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
        working-directory: ${{ env.EXAMPLE_APP }}/ios
