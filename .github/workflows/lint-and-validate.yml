name: Lint, Test and Validate

run-name: Lint, test sources and validate json

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-validate:
    runs-on: rnrepo-ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      pull-requests: read
    outputs:
      typescript: ${{ steps.filter.outputs.typescript }}
      kotlin: ${{ steps.filter.outputs.kotlin }}
      json: ${{ steps.filter.outputs.json }}
    concurrency:
      group: lint-and-validate-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Check for file changes
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            typescript:
              - '**/*.ts'
              - '**/*.tsx'
              - '.github/workflows/lint-and-validate.yml'
            kotlin:
              - 'packages/gradle-client/**'
              - '.github/workflows/lint-and-validate.yml'
            json:
              - '*.json'
              - '.github/workflows/lint-and-validate.yml'
            ruby:
              - 'packages/cocoapods-plugin/**'
              - '.github/workflows/lint-and-validate.yml'

      - name: 🏗 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 🏗 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
          working-directory: packages/cocoapods-plugin

      - name: 🏗 Install rubocop
        run: gem install rubocop

      - name: 🗃️ Cache Bun and Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-bun-gradle-${{ hashFiles('**/bun.lock', '**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-bun-gradle-

      - name: 📦 Install dependencies
        run: bun install

      - name: 🔍 Lint kotlin
        if: ${{ steps.filter.outputs.kotlin == 'true' }}
        run: bun run lint-gradle-client

      - name: 🔍 Lint typescript
        if: ${{ steps.filter.outputs.typescript == 'true' }}
        run: bun run lint-ts

      - name: 🔍 Lint ruby
        if: ${{ steps.filter.outputs.ruby == 'true' }}
        working-directory: packages/cocoapods-plugin
        run: bun run lint-ruby

      - name: ✅ Validate JSON files
        if: ${{ steps.filter.outputs.json == 'true' }}
        run: bun run validate

      - name: 🧪 Run gradle-client tests
        if: ${{ steps.filter.outputs.kotlin == 'true' }}
        run: bun run test-gradle-client

      - name: 🧪 Run ts tests
        if: ${{ steps.filter.outputs.typescript == 'true' }}
        run: bun test
