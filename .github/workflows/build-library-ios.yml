name: Build iOS Library

run-name: Build for iOS ${{ inputs.library_name }}@${{ inputs.library_version }} RN@${{ inputs.react_native_version }}${{ inputs.worklets_version && format(' with worklets@{0}', inputs.worklets_version) || '' }}${{ inputs.test_run_snapshot && ' - snapshot' || '' }}

on:
  workflow_dispatch:
    inputs:
      library_name:
        description: 'Library name (from NPM)'
        required: true
        type: string
      library_version:
        description: 'Library version (from NPM)'
        required: true
        type: string
      react_native_version:
        description: 'React Native version'
        required: true
        type: string
      worklets_version:
        description: 'Worklets version'
        required: false
        type: string
      test_run_snapshot:
        description: 'Test build for snapshot repository publishing'
        required: false
        type: boolean
        default: false

jobs:
  build-library-ios:
    runs-on: [self-hosted, macOS, ARM64, ephemeral]
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 🍎 Setup iOS environment
        uses: ./.github/actions/setup-ios

      - name: 🏗 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --ignore-scripts

      - name: ♻️ Restore RN project cache
        id: rn-project-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/rnrepo_build_app
          key: ${{ runner.os }}-rn-project-cache-${{ inputs.react_native_version }}

      - name: 📱 Create RN project (cache miss)
        if: steps.rn-project-cache.outputs.cache-hit != 'true'
        run: bun run packages/builder/build-utils.ts -- "$RUNNER_TEMP" "$INPUTS_REACT_NATIVE_VERSION"
        env:
          RUNNER_TEMP: ${{ runner.temp }}
          INPUTS_REACT_NATIVE_VERSION: ${{ inputs.react_native_version }}

      - name: 💾 Save RN project cache (clean)
        if: steps.rn-project-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/rnrepo_build_app
          key: ${{ runner.os }}-rn-project-cache-${{ inputs.react_native_version }}

      - name: 🔨 Build library for iOS
        run: bun run packages/builder/build-library-ios.ts -- "$INPUTS_LIBRARY_NAME" "$INPUTS_LIBRARY_VERSION" "$INPUTS_REACT_NATIVE_VERSION" "$RUNNER_TEMP" "$INPUTS_WORKLETS_VERSION"
        env:
          RUNNER_TEMP: ${{ runner.temp }}
          INPUTS_LIBRARY_NAME: ${{ inputs.library_name }}
          INPUTS_LIBRARY_VERSION: ${{ inputs.library_version }}
          INPUTS_REACT_NATIVE_VERSION: ${{ inputs.react_native_version }}
          INPUTS_WORKLETS_VERSION: ${{ inputs.worklets_version }}

      - name: 📦 Upload framework artifacts
        uses: actions/upload-artifact@v4
        with:
          name: framework-artifacts
          path: ${{ runner.temp }}/outputs/
          retention-days: 1
