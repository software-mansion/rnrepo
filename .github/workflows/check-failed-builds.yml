name: Check Failed Builds

on:
  workflow_dispatch:
    inputs:
      write:
        description: 'Apply changes to the database (dry run if unchecked)'
        required: false
        type: boolean
        default: false
  schedule:
    # Runs every day
    - cron: '0 6 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-failed-builds:
    runs-on: rnrepo-ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: 🏗 Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
        with:
          bun-version: latest

      - name: 🗃️ Cache Bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: 📦 Install dependencies
        run: bun install --ignore-scripts

      - name: 🔍 Check failed builds
        env:
          GITHUB_TOKEN: ${{ secrets.SCHEDULER_GITHUB_PAT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SHOULD_WRITE: ${{ (github.event.inputs.write == 'true' || github.event_name == 'schedule') && '--write' || '' }}
        run: |
          bun run --cwd packages/database src/get-failed-builds.ts "$SHOULD_WRITE"
