name: Build Android Library

run-name: Build for Android ${{ inputs.library_name }}@${{ inputs.library_version }} RN@${{ inputs.react_native_version }}${{ inputs.worklets_version && format(' with worklets@{0}', inputs.worklets_version) || '' }}${{ inputs.test_run_snapshot && ' - snapshot' || '' }}

on:
  workflow_dispatch:
    inputs:
      library_name:
        description: 'Library name (from NPM)'
        required: true
        type: string
      library_version:
        description: 'Library version (from NPM)'
        required: true
        type: string
      react_native_version:
        description: 'React Native version'
        required: true
        type: string
      worklets_version:
        description: 'Worklets version'
        required: false
        type: string
      test_run_snapshot:
        description: 'Test build for snapshot repository publishing'
        required: false
        type: boolean
        default: false

jobs:
  build-library-android:
    runs-on: rnrepo-builder-ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: 🤖 Setup Android environment
        uses: ./.github/actions/setup-android
        with:
          setup-sdk: 'true'

      - name: 🏗 Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --ignore-scripts

      - name: ♻️ Restore RN project cache
        id: rn-project-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ runner.temp }}/rnrepo_build_app
          key: ${{ runner.os }}-rn-project-cache-${{ inputs.react_native_version }}

      - name: 📱 Create RN project (cache miss)
        if: steps.rn-project-cache.outputs.cache-hit != 'true'
        run: bun run packages/builder/build-utils.ts -- "$RUNNER_TEMP" "$INPUTS_REACT_NATIVE_VERSION"
        env:
          RUNNER_TEMP: ${{ runner.temp }}
          INPUTS_REACT_NATIVE_VERSION: ${{ inputs.react_native_version }}

      - name: 💾 Save RN project cache (clean)
        if: steps.rn-project-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ runner.temp }}/rnrepo_build_app
          key: ${{ runner.os }}-rn-project-cache-${{ inputs.react_native_version }}

      - name: 🔨 Build library for Android
        run: bun run packages/builder/build-library-android.ts -- "${INPUTS_LIBRARY_NAME}" "${INPUTS_LIBRARY_VERSION}" "${INPUTS_REACT_NATIVE_VERSION}" "$RUNNER_TEMP" "${INPUTS_WORKLETS_VERSION}"
        env:
          RUNNER_TEMP: ${{ runner.temp }}
          INPUTS_LIBRARY_NAME: ${{ inputs.library_name }}
          INPUTS_LIBRARY_VERSION: ${{ inputs.library_version }}
          INPUTS_REACT_NATIVE_VERSION: ${{ inputs.react_native_version }}
          INPUTS_WORKLETS_VERSION: ${{ inputs.worklets_version }}

      - name: 📋 List artifacts with checksums
        run: |
          find ~/.m2/repository/org/rnrepo/public -type f -exec md5sum {} \;

      - name: 📦 Upload Maven artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: maven-artifacts
          path: |
            ~/.m2/repository/org/rnrepo/public
          retention-days: 1
