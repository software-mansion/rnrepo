name: Run Scheduler

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Maximum number of jobs to schedule (defaults to 1 if not provided)'
        required: false
        type: number
        default: 1
  schedule:
    # Runs every 4 hours at minute 0 (6 times per day)
    - cron: '0 */4 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-scheduler:
    runs-on: rnrepo-ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
      contents: read

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: 🏗 Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
        with:
          bun-version: latest

      - name: 🗃️ Cache Bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: 📦 Install dependencies
        run: bun install --ignore-scripts

      - name: 🔄 Run scheduler
        env:
          GITHUB_TOKEN: ${{ secrets.SCHEDULER_GITHUB_PAT }}
          SCHEDULER_LIMIT: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.limit || 1) || 200 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: bun run scheduler

